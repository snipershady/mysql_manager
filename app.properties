# =============================================================================
# MySQL Manager — configurazione esterna
# =============================================================================
# Copia questo file in una directory sicura (es. /etc/mysql-manager/app.properties)
# e passalo all'avvio con:
#   java -jar mysql-manager.jar --spring.config.additional-location=/etc/mysql-manager/app.properties
#
# I valori qui presenti sovrascrivono quelli embedded nel JAR.
# NON committare questo file con credenziali reali.
# =============================================================================

# ===== Server =====
server.port=8080
server.servlet.session.timeout=30m
server.tomcat.accesslog.enabled=false

# ===== Datasource (schema interno dell'applicazione) =====
spring.datasource.username=mysql_manager_user
spring.datasource.password=CAMBIA_QUESTA_PASSWORD

# ===== MySQL da gestire =====
mysql.manager.host=127.0.0.1
mysql.manager.port=3306
mysql.manager.user=root
mysql.manager.password=CAMBIA_QUESTA_PASSWORD

# ===== Backup =====
backup.path=/var/backups/mysql-manager
backup.mysqldump=/usr/bin/mysqldump
backup.mysql=/usr/bin/mysql

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== Thymeleaf =====
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# ===== Logging =====
logging.level.com.mysqlmanager=WARN
logging.level.root=WARN
logging.level.org.springframework.security=WARN
#logging.file.name=/var/log/mysql-manager/app.log
