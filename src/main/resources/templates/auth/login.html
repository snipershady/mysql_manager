<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — MySQL Manager</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="auth-page">
<div class="auth-card">
    <h1>MySQL Manager</h1>
    <h2>Accesso</h2>

    <script th:if="${param.error}" th:inline="javascript">
        Swal.fire({
            title: 'Errore!',
            text: 'Credenziali non valide. Riprova.',
            icon: 'error',
            confirmButtonColor: '#dc2626'
        });
    </script>
    <script th:if="${param.logout}" th:inline="javascript">
        Swal.fire({
            title: 'Logout!',
            text: 'Disconnessione avvenuta con successo.',
            icon: 'success',
            confirmButtonColor: '#2563eb'
        });
    </script>
    <script th:if="${param.expired}" th:inline="javascript">
        Swal.fire({
            title: 'Sessione scaduta!',
            text: 'Sessione scaduta. Accedi nuovamente.',
            icon: 'warning',
            confirmButtonColor: '#2563eb'
        });
    </script>
    <script th:if="${param['password-changed']}" th:inline="javascript">
        Swal.fire({
            title: 'Password aggiornata!',
            text: 'Password aggiornata. Accedi con la nuova password.',
            icon: 'success',
            confirmButtonColor: '#2563eb'
        });
    </script>
    <script th:if="${param['mfa-reset']}" th:inline="javascript">
        Swal.fire({
            title: 'MFA resettato!',
            text: 'MFA resettato. Accedi per configurare un nuovo dispositivo.',
            icon: 'success',
            confirmButtonColor: '#2563eb'
        });
    </script>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus
                   placeholder="Inserisci username"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   placeholder="Inserisci password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Accedi</button>
    </form>
</div>
</body>
</html>
