<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — MySQL Manager</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="auth-page">
<div class="auth-card">
    <h1>MySQL Manager</h1>
    <h2>Accesso</h2>

    <div th:if="${param.error}" class="alert alert-error">
        Credenziali non valide. Riprova.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Disconnessione avvenuta con successo.
    </div>
    <div th:if="${param.expired}" class="alert alert-error">
        Sessione scaduta. Accedi nuovamente.
    </div>
    <div th:if="${param['password-changed']}" class="alert alert-success">
        Password aggiornata. Accedi con la nuova password.
    </div>
    <div th:if="${param['mfa-reset']}" class="alert alert-success">
        MFA resettato. Accedi per configurare un nuovo dispositivo.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus
                   placeholder="Inserisci username"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   placeholder="Inserisci password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Accedi</button>
    </form>
</div>
</body>
</html>
