<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Crea Utente MySQL')}"></head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>
<main class="container">
    <h1>Crea Utente MySQL</h1>

    <div th:replace="~{layout/base :: alerts}"></div>

    <form th:action="@{/mysql-users/create}" method="post" class="form-card">
        <div class="form-group">
            <label>Username MySQL</label>
            <input type="text" name="user" required pattern="[a-zA-Z0-9_$%@.]{1,64}"
                   placeholder="nomeutente"/>
        </div>
        <div class="form-group">
            <label>Host (% = tutti)</label>
            <input type="text" name="host" value="%" required/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required/>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Crea</button>
            <a th:href="@{/mysql-users}" class="btn btn-secondary">Annulla</a>
        </div>
    </form>
</main>
</body>
</html>
