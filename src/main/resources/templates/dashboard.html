<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Dashboard')}"></head>
<body>

<nav th:replace="~{layout/base :: navbar}"></nav>

<main class="container">
    <h1>Dashboard</h1>

    <div th:replace="~{layout/base :: alerts}"></div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Database</h3>
            <span class="stat-number" th:text="${databases != null ? databases.size() : 0}">0</span>
        </div>
    </div>

    <div class="section">
        <h2>Database disponibili</h2>
        <div th:if="${databases != null and !databases.isEmpty()}">
            <div class="db-grid">
                <a th:each="db : ${databases}"
                   th:href="@{/db/{db}(db=${db})}"
                   class="db-card">
                    <span class="db-icon">&#128447;</span>
                    <span th:text="${db}">database</span>
                </a>
            </div>
        </div>
        <p th:if="${databases == null or databases.isEmpty()}" class="empty-state">
            Nessun database trovato.
        </p>
    </div>

    <div class="section" sec:authorize="hasRole('ADMIN')">
        <h2>Attività recenti</h2>
        <table th:if="${recentAudit != null and !recentAudit.isEmpty()}" class="table">
            <thead>
                <tr>
                    <th>Utente</th>
                    <th>Database</th>
                    <th>SQL</th>
                    <th>Tempo (ms)</th>
                    <th>Esito</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${recentAudit}">
                    <td th:text="${log.username}"></td>
                    <td th:text="${log.targetDatabase}"></td>
                    <td><code th:text="${#strings.abbreviate(log.sqlText, 60)}"></code></td>
                    <td th:text="${log.executionTimeMs}"></td>
                    <td>
                        <span th:if="${log.success}" class="badge badge-success">OK</span>
                        <span th:unless="${log.success}" class="badge badge-error">ERRORE</span>
                    </td>
                    <td th:text="${#temporals.format(log.executedAt, 'dd/MM HH:mm:ss')}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
