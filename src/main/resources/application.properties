# ===== Server =====
server.port=8080
server.servlet.session.timeout=30m
server.tomcat.accesslog.enabled=false

# ===== App datasource (schema dell'applicazione) =====
# Credenziali usate da DataSourceConfig per creare mysql_manager_app e il pool principale
spring.datasource.username=root
spring.datasource.password=mammt
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== MySQL da gestire =====
mysql.manager.host=127.0.0.1
mysql.manager.port=3306
mysql.manager.user=root
mysql.manager.password=mammt

# ===== Backup =====
backup.path=${user.home}/mysql-backups
backup.mysqldump=/usr/bin/mysqldump
backup.mysql=/usr/bin/mysql

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===== Logging =====
logging.level.com.mysqlmanager=INFO
logging.level.org.springframework.security=WARN
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true
#logging.file.name=/var/log/mysql-manager/app.log
